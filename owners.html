<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Owners | Camelixir</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#f7f3ee;
font-family:'Inter',sans-serif;
min-height:100vh;
overflow-x:hidden;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

/* background text */

.bg-text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);

font-size:220px;
font-weight:700;

font-family:'Cormorant Garamond',serif;

letter-spacing:20px;

opacity:.03;

white-space:nowrap;

pointer-events:none;
}

/* content */

.container{
width:min(1000px,90%);
position:relative;
z-index:2;
}

.subtitle{
text-align:center;
color:#B8892A;
letter-spacing:.4em;
font-size:12px;
margin-bottom:15px;
}

.title{
font-family:'Cormorant Garamond',serif;
font-size:90px;
font-weight:500;
text-align:center;
margin-bottom:60px;
color:#1a1510;
}

/* cards */

.owner{
background:white;
padding:30px 35px;
margin-bottom:18px;

border-radius:20px;

display:flex;
align-items:center;
gap:25px;

box-shadow:0 10px 30px rgba(0,0,0,.05);

transition:.35s;
}

.owner:hover{
transform:translateY(-5px);
box-shadow:0 15px 35px rgba(184,137,42,.15);
}

.number{
font-size:20px;
font-weight:700;
color:#B8892A;
min-width:50px;
}

.name{
font-size:34px;
font-family:'Cormorant Garamond',serif;
}

.back-btn{
position:fixed;
top:30px;
left:30px;

text-decoration:none;

background:#B8892A;
color:white;

padding:12px 24px;
border-radius:10px;
}

@media(max-width:768px){

.bg-text{
font-size:80px;
}

.title{
font-size:50px;
}

.name{
font-size:22px;
}

.owner{
padding:20px;
}

}

</style>
</head>

<body>

<div class="bg-text">
OWNERS
</div>

<a href="index.html" class="back-btn">
← Back
</a>

<div class="container">

<div class="subtitle">
THE TEAM BEHIND CAMELIXIR
</div>

<h1 class="title">
OWNERS
</h1>

<div class="owner">
<div class="number">-</div>
<div class="name">Dalia Mohamed Abdallah</div>
</div>

<div class="owner">
<div class="number">-</div>
<div class="name">Rewan Amin Fawzy</div>
</div>

<div class="owner">
<div class="number">-</div>
<div class="name">Mona Ashraf Mohamed</div>
</div>

<div class="owner">
<div class="number">-</div>
<div class="name">Menna Ashraf</div>
</div>

<div class="owner">
<div class="number">-</div>
<div class="name">Saada Shaaban</div>
</div>

</div>

</body>
</html>
